<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InferSpore - C++ LLM Engine</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-mesh">
        <div class="mesh-blob blob-1"></div>
        <div class="mesh-blob blob-2"></div>
    </div>

    <div class="app-container">
        <header class="glass-panel">
            <div class="logo">
                <span class="logo-icon"></span>
                <h1>InferSpore</h1>
            </div>
            <div class="status-badge">
                <span class="pulse-dot"></span>
                CUDA Engine Ready
            </div>
        </header>

        <main class="chat-container glass-panel">
            <div id="chat-history" class="chat-history">
                <div class="message system">
                    <div class="message-content">
                        <p>Welcome to InferSpore. High-performance, pure C++ inference engine initialized. Waiting for prompt...</p>
                    </div>
                </div>
            </div>

            <div class="input-area">
                <form id="chat-form">
                    <div class="input-wrapper">
                        <textarea id="prompt-input" placeholder="Enter your prompt here..." rows="1" autofocus></textarea>
                        <button type="submit" id="send-btn" class="send-btn" aria-label="Send Prompt">
                            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                        </button>
                    </div>
                </form>
                <div class="input-footer">
                    <span>Press Enter to send (Shift+Enter for new line)</span>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
